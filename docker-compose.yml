version: '3.8'

services:
  star-rseqc:
    build:
      context: .
      dockerfile: Dockerfile
    image: star-rseqc:latest
    container_name: star-rseqc-pipeline

    # Mount volumes for data access
    volumes:
      # Read-only FASTQ input
      - ${FASTQ_DIR:-.}:/data/input:ro
      # Results output (writable)
      - ${OUTPUT_DIR:-./star-rseqc-results}:/data/output
      # Reference files (read-only)
      - ${GENOME_DIR:-.}:/data/reference/genome:ro
      - ${GTF_DIR:-.}:/data/reference/gtf:ro
      # Config
      - ${CONFIG_DIR:-./config}:/root/.config/star-rseqc:ro

    environment:
      - STAR_THREADS=${STAR_THREADS:-8}
      - PARALLEL_JOBS=${PARALLEL_JOBS:-4}

    # Resource limits (configurable via env vars)
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-16}'
          memory: ${MEM_LIMIT:-32G}
        reservations:
          cpus: '${CPU_RESERVE:-8}'
          memory: ${MEM_RESERVE:-16G}

    # Interactive mode
    stdin_open: true
    tty: true

    # Run as non-root if possible
    user: "1000:1000"

# Usage:
#   FASTQ_DIR=/path/to/fastq docker-compose up
#
# Override resources:
#   CPU_LIMIT=32 MEM_LIMIT=64G docker-compose up
#
# For interactive debugging, use the override file:
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   docker-compose up
